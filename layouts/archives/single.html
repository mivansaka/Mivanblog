{{- /*  archives/single.html - All Posts Page  */ -}}
{{- define "main" -}}
<div class="all-posts-page">
    <header class="page-header">
        <h1 class="page-title">所有文章</h1>
        <p class="page-subtitle">收录从2014年至今的思考与记录</p>
    </header>

    <section class="posts-section">
        {{- range .Site.RegularPages.ByDate.Reverse }}
        <article class="post-item">
            <span class="post-year">{{ .Date.Format "2006" }}</span>
            <div class="post-content">
                <h2 class="post-title">
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </h2>
                <p class="post-meta">
                    {{ .Date.Format "January 2" }}
                </p>
            </div>
        </article>
        {{- end }}
    </section>
</div>

<style>
    .all-posts-page {
        max-width: 1440px;
        margin: 0 auto;
        padding: 6rem 3.5rem 16rem;
    }

    .page-header {
        margin-bottom: 8rem;
    }

    .page-title {
        font-family: 'Newsreader', Georgia, serif;
        font-size: clamp(3rem, 6vw, 6rem);
        font-weight: 300;
        font-style: italic;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: #1b1c19;
        margin: 0 0 1rem 0;
    }

    .page-subtitle {
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 1.125rem;
        font-weight: 300;
        color: #444748;
        line-height: 1.6;
        margin: 0;
    }

    .posts-section {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .post-item {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 2rem 0;
        border-bottom: 1px solid #e5e2e1;
        transition: opacity 0.3s ease;
    }

    .post-item:hover {
        opacity: 0.6;
    }

    .post-year {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #444748;
        opacity: 0.4;
        font-weight: 400;
    }

    .post-content {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .post-title {
        font-family: 'Newsreader', Georgia, serif;
        font-size: clamp(1.5rem, 3vw, 2rem);
        font-weight: 400;
        line-height: 1.3;
        margin: 0;
    }

    .post-title a {
        color: #1b1c19;
        text-decoration: none;
        transition: font-style 0.3s ease;
    }

    .post-title a:hover {
        font-style: italic;
    }

    .post-meta {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #444748;
        opacity: 0.7;
        font-weight: 300;
        margin: 0;
    }

    @media (min-width: 768px) {
        .post-item {
            flex-direction: row;
            align-items: baseline;
            gap: 8rem;
        }

        .post-year {
            min-width: 5rem;
        }
    }

    @media (max-width: 767px) {
        .all-posts-page {
            padding: 4rem 2rem 12rem;
        }

        .page-title {
            font-size: 2.5rem;
        }
    }

    /* Dark mode */
    .dark .page-title,
    .dark .post-title a {
        color: #fbf9f3;
    }

    .dark .page-subtitle,
    .dark .post-year,
    .dark .post-meta {
        color: #c4c7c7;
    }

    .dark .post-item {
        border-bottom-color: #474746;
    }
</style>
{{- end }}
