baseURL: "https://example.com"
title: "The Modern Scholar"
languageCode: "en-us"
theme: "PaperMod"

# 启用相对 URL
relativeURLs: true

# 分页
paginate: 5

# 启用 Emoji
enableEmoji: true

# 启用内联短代码
enableInlineShortcodes: true

# 启用 GitInfo
enableGitInfo: true

# 启用 Lastmod 读取
enableRobotsTXT: true

# 构建配置
buildDrafts: false
buildFuture: false
buildExpired: false

# 谷歌分析（可选）
# googleAnalytics: ""

# 菜单配置
menu:
  main:
    - identifier: essays
      name: Essays
      url: /essays/
      weight: 1
    - identifier: library
      name: Library
      url: /library/
      weight: 2
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 3
    - identifier: about
      name: About
      url: /about/
      weight: 4

# PaperMod 主题配置
params:
  # 首页副标题
  homeSubtitle: "A digital garden exploring the intersection of classical humanities, modern computation, and the quiet pursuit of intellectual depth in a noisy world."

  # 主题模式
  defaultTheme: light
  disableThemeToggle: false

  # 首页配置
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # 资产配置
  assets:
    disableHLJS: true
    disableFingerprinting: false
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.ico"
    favicon32x32: "/favicon-32x32.ico"

  # 标签配置
  label:
    text: "The Modern Scholar"
    icon: /apple-touch-icon.png
    iconHeight: 30

  # 主页配置
  # profileMode:
  #   enabled: false
  #   title: "The Modern Scholar"
  #   subtitle: "A digital garden exploring the intersection of classical humanities, modern computation, and the quiet pursuit of intellectual depth in a noisy world."
  #   imageUrl: ""
  #   imageWidth: 120
  #   imageHeight: 120
  #   imageTitle: my image
  #   buttons:
  #     - name: Essays
  #       url: essays
  #     - name: Archives
  #       url: archives

  # 社交图标
  socialIcons:
    - name: twitter
      url: "https://twitter.com/"
    - name: github
      url: "https://github.com/"

  # 自定义配置
  customCSS:
    - css/custom.css

# 隐私配置
privacy:
  vimeo:
    disable: false
    simple: true
  youtube:
    disable: false
    privacyEnhanced: true

# 输出格式
outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS

# Markup 配置
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: monokai
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
